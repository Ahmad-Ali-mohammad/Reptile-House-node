services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: semo-main:production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      TRUST_PROXY: ${TRUST_PROXY:-1}
      PUBLIC_SERVER_URL: ${PUBLIC_SERVER_URL:-http://localhost:3001}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-600}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      DB_NAME: semo_reptile_house
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      BOOTSTRAP_ADMIN_SECRET: ${BOOTSTRAP_ADMIN_SECRET:?BOOTSTRAP_ADMIN_SECRET is required}
      AUTO_APPLY_SCHEMA: ${AUTO_APPLY_SCHEMA:-1}
      AUTO_SEED: ${AUTO_SEED:-1}
      STARTUP_DB_MAX_ATTEMPTS: ${STARTUP_DB_MAX_ATTEMPTS:-30}
      STARTUP_DB_RETRY_MS: ${STARTUP_DB_RETRY_MS:-2000}
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      - uploads_data:/app/server/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: semo_reptile_house
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  mysql_data:
  uploads_data:
